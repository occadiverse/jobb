<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaktplan med Meny</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #1a73e8; }
        
        .week-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        .week-title { background: #1a73e8; color: white; padding: 6px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #eef0f2; padding: 5px; text-align: center; }
        th { background: #f8f9fa; font-size: 11px; padding: 10px; }
        
        .name-col { width: 140px; text-align: left; font-weight: bold; background: #fff !important; }

        /* DROPDOWN STYLING */
        select {
            width: 100%;
            padding: 8px 2px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            appearance: none; /* Fjerner pilen for et renere utseende */
            background: transparent;
        }

        /* FARGEKODER FOR VALG */
        .vakt-D { background-color: #d4edda !important; color: #155724; } 
        .vakt-L { background-color: #e2d9f3 !important; color: #4b2c85; } 
        .vakt-B { background-color: #fff3cd !important; color: #856404; } 
        .vakt-F { background-color: #f8d7da !important; color: #721c24; } 
        .vakt-A { background-color: #ffe5d0 !important; color: #853c00; }
        .vakt-tom { background-color: white; }

        .print-btn { display: block; margin: 20px auto; padding: 12px 25px; background: #1a73e8; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        
        @media print { .print-btn { display: none; } select { border: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 Vaktplan April 2026</h1>
    <div id="wrapper"></div>
    <button class="print-btn" onclick="window.print()">Skriv ut / PDF</button>
</div>

<script>
    const ansatte = ["Alex", "Mats", "Ole Christian", "Pedro"];
    
    // Definerer vakt-typene
    const vakter = [
        { kode: "", navn: "-" },
        { kode: "D", navn: "D - Dag" },
        { kode: "L", navn: "L - Kveld" },
        { kode: "B", navn: "B - Bakvakt" },
        { kode: "A", navn: "A - Ansvar" },
        { kode: "F", navn: "F - Fri" }
    ];

    const ukePlan = [
        { uke: 14, dager: [{n:1, t:"Ons"}, {n:2, t:"Tor"}, {n:3, t:"Fre"}] },
        { uke: 15, dager: [{n:6, t:"Man"}, {n:7, t:"Tir"}, {n:8, t:"Ons"}, {n:9, t:"Tor"}, {n:10, t:"Fre"}] },
        { uke: 16, dager: [{n:13, t:"Man"}, {n:14, t:"Tir"}, {n:15, t:"Ons"}, {n:16, t:"Tor"}, {n:17, t:"Fre"}] },
        { uke: 17, dager: [{n:20, t:"Man"}, {n:21, t:"Tir"}, {n:22, t:"Ons"}, {n:23, t:"Tor"}, {n:24, t:"Fre"}] },
        { uke: 18, dager: [{n:27, t:"Man"}, {n:28, t:"Tir"}, {n:29, t:"Ons"}, {n:30, t:"Tor"}] }
    ];

    const wrapper = document.getElementById('wrapper');

    ukePlan.forEach(ukeObj => {
        let div = document.createElement('div');
        div.className = 'week-container';
        
        let html = `<div class="week-title">Uke ${ukeObj.uke}</div>`;
        html += `<table><thead><tr><th class="name-col">Ansatt</th>`;
        ukeObj.dager.forEach(d => { html += `<th>${d.t} ${d.n}.</th>`; });
        html += `</tr></thead><tbody>`;

        ansatte.forEach(navn => {
            html += `<tr><td class="name-col">${navn}</td>`;
            ukeObj.dager.forEach(d => {
                let key = `apr26-v4-${navn}-${d.n}`;
                let saved = localStorage.getItem(key) || "";
                let cellClass = saved ? `vakt-${saved}` : "vakt-tom";
                
                html += `<td class="${cellClass}">`;
                html += `<select onchange="update(this, '${navn}', ${d.n})">`;
                vakter.forEach(v => {
                    let selected = (saved === v.kode) ? "selected" : "";
                    html += `<option value="${v.kode}" ${selected}>${v.kode || "-"}</option>`;
                });
                html += `</select></td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        div.innerHTML = html;
        wrapper.appendChild(div);
    });

    function update(select, navn, dag) {
        const val = select.value;
        const td = select.parentElement;
        
        // Oppdater farge på cellen
        td.className = val ? `vakt-${val}` : "vakt-tom";
        
        // Lagre til localStorage
        localStorage.setItem(`apr26-v4-${navn}-${dag}`, val);
    }
</script>
</body>
</html>
