<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaktplan Jobb - v3 (CSV-støtte)</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        
        /* TOPPFELT */
        .top-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-group { display: flex; align-items: center; gap: 15px; }
        h1 { margin: 0; color: #1a73e8; font-size: 1.5rem; white-space: nowrap; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        
        .action-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        select.month-picker { 
            padding: 8px 15px; 
            border-radius: 8px; 
            border: 2px solid #1a73e8; 
            font-size: 1rem; 
            font-weight: bold; 
            color: #1a73e8; 
            cursor: pointer;
            background: white;
        }

        .week-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        .week-title { background: #1a73e8; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #eef0f2; padding: 4px; text-align: center; }
        th { background: #f8f9fa; font-size: 11px; padding: 10px; text-transform: uppercase; }
        
        .name-col { width: 150px; text-align: left; font-weight: bold; background: #fff !important; padding-left: 10px; }

        select.vakt-select { width: 100%; padding: 10px 2px; border: none; border-radius: 4px; font-weight: 600; text-align: center; cursor: pointer; appearance: none; background: transparent; font-size: 13px; }

        /* FARGER */
        .vakt-Dispatch { background-color: #d4edda !important; color: #155724; } 
        .vakt-Leasing { background-color: #e2d9f3 !important; color: #4b2c85; } 
        .vakt-Bod { background-color: #fff3cd !important; color: #856404; } 
        .vakt-Avspasering { background-color: #ffe5d0 !important; color: #853c00; } 
        .vakt-Fri { background-color: #f8d7da !important; color: #721c24; }
        .vakt-tom { background-color: white; }

        /* KNAPPER */
        .btn { 
            padding: 10px 15px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.85rem; 
            transition: 0.2s;
        }
        .btn-print { background: #64748b; color: white; }
        .btn-export { background: #10b981; color: white; }
        .btn-import { background: #f59e0b; color: white; }
        .btn-csv { background: #3b82f6; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        
        input[type="file"] { display: none; }

        @media print { 
            .top-header, .action-bar { border-bottom: 1px solid #ccc; margin-bottom: 20px; }
            .btn, .month-picker, input { display: none !important; } 
            h1::after { content: " " attr(data-month); }
            .week-container { box-shadow: none; border: 1px solid #ddd; } 
        }
    </style>
</head>
<body>

<div class="top-header">
    <div class="title-group">
        <h1 id="mainTitle">Vaktplan</h1>
        <select id="monthSelect" class="month-picker" onchange="initCalendar()"></select>
    </div>
    <div class="action-bar">
        <button class="btn btn-csv" onclick="document.getElementById('csvInput').click()">📊 Importer CSV</button>
        <button class="btn btn-export" onclick="exportData()">💾 Lagre JSON</button>
        <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">📂 Last inn JSON</button>
        <button class="btn btn-print" onclick="window.print()">🖨️ PDF / Print</button>
        
        <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
        <input type="file" id="csvInput" accept=".csv" onchange="importCSV(event)">
    </div>
</div>

<div class="container">
    <div id="wrapper"></div>
</div>

<script>
    const ansatte = ["Alex", "Mats", "Ole Christian", "Pedro"];
    const vakter = ["-", "Dispatch", "Leasing", "Bod", "Avspasering", "Fri"];
    const måneder = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];

    const monthSelect = document.getElementById('monthSelect');
    const mainTitle = document.getElementById('mainTitle');
    const currentYear = 2026;

    // Fyll måned-velgeren
    måneder.forEach((m, i) => {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = m + " " + currentYear;
        // Setter nåværende måned (April = 3) som default
        if(i === 3) opt.selected = true; 
        monthSelect.appendChild(opt);
    });

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function initCalendar() {
        const monthIndex = parseInt(monthSelect.value);
        const wrapper = document.getElementById('wrapper');
        mainTitle.setAttribute('data-month', måneder[monthIndex] + " " + currentYear);
        wrapper.innerHTML = "";

        let date = new Date(currentYear, monthIndex, 1);
        let uker = {};

        while (date.getMonth() === monthIndex) {
            let dayOfWeek = date.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
                let wNum = getWeekNumber(new Date(date));
                if (!uker[wNum]) uker[wNum] = [];
                uker[wNum].push({
                    nr: date.getDate(),
                    navn: ["Søn", "Man", "Tir", "Ons", "Tor", "Fre", "Lør"][dayOfWeek]
                });
            }
            date.setDate(date.getDate() + 1);
        }

        for (let wNum in uker) {
            let div = document.createElement('div');
            div.className = 'week-container';
            
            let html = `<div class="week-title">Uke ${wNum}</div>`;
            html += `<table><thead><tr><th class="name-col">Ansatt</th>`;
            uker[wNum].forEach(d => { html += `<th>${d.navn} ${d.nr}.</th>`; });
            html += `</tr></thead><tbody>`;

            ansatte.forEach(navn => {
                html += `<tr><td class="name-col">${navn}</td>`;
                uker[wNum].forEach(d => {
                    let storageKey = `vakt-full-${currentYear}-${monthIndex}-${navn}-${d.nr}`;
                    let saved = localStorage.getItem(storageKey) || "-";
                    let cellClass = (saved !== "-") ? `vakt-${saved}` : "vakt-tom";
                    
                    html += `<td class="${cellClass}">
                        <select class="vakt-select" onchange="update(this, '${storageKey}')">`;
                    vakter.forEach(v => {
                        let sel = (saved === v) ? "selected" : "";
                        html += `<option value="${v}" ${sel}>${v}</option>`;
                    });
                    html += `</select></td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            div.innerHTML = html;
            wrapper.appendChild(div);
        }
    }

    function update(select, key) {
        const val = select.value;
        const td = select.parentElement;
        td.className = (val !== "-") ? `vakt-${val}` : "vakt-tom";
        localStorage.setItem(key, val);
    }

    // --- JSON EKSPORT/IMPORT ---
    function exportData() {
        const data = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith("vakt-full-")) {
                data[key] = localStorage.getItem(key);
            }
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `vaktplan_backup_${måneder[monthSelect.value]}.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (confirm("Dette vil overskrive lagrede vakter. Fortsette?")) {
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    initCalendar();
                }
            } catch (err) { alert("Ugyldig JSON-fil."); }
        };
        reader.readAsText(file);
    }

    // --- CSV IMPORT ---
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split("\n");
            const monthIndex = parseInt(monthSelect.value);
            let count = 0;

            rows.forEach((row, index) => {
                if (index === 0 || row.trim() === "") return; 
                const cols = row.split(",").map(c => c.trim());
                
                if (cols.length >= 3) {
                    const navn = cols[0];
                    const dato = cols[1];
                    const vakt = cols[2];

                    if (ansatte.includes(navn) && vakter.includes(vakt)) {
                        const storageKey = `vakt-full-${currentYear}-${monthIndex}-${navn}-${dato}`;
                        localStorage.setItem(storageKey, vakt);
                        count++;
                    }
                }
            });
            alert(`Importerte ${count} vakter til ${måneder[monthIndex]}.`);
            initCalendar();
        };
        reader.readAsText(file);
    }

    initCalendar();
</script>

</body>
</html>
