<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Vaktplan April 2026</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        
        .week-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .week-title { background: #1a73e8; color: white; padding: 6px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid #eef0f2; padding: 8px; text-align: center; transition: all 0.2s; }
        th { background: #f8f9fa; font-size: 11px; color: #666; text-transform: uppercase; }
        
        .name-col { width: 140px; text-align: left; font-weight: bold; background: #fff !important; border-right: 2px solid #dee2e6; }
        
        /* Markering av dagens dato (hvis i april 2026) */
        .today-col { background: #fff9c4 !important; border: 2px solid #fbc02d !important; }

        /* VAKT-FARGER */
        .vakt-D { background-color: #d4edda !important; color: #155724; } 
        .vakt-L { background-color: #e2d9f3 !important; color: #4b2c85; } 
        .vakt-B { background-color: #fff3cd !important; color: #856404; } 
        .vakt-F { background-color: #f8d7da !important; color: #721c24; } 
        .vakt-A { background-color: #ffe5d0 !important; color: #853c00; }

        input { width: 100%; border: none; background: transparent; text-align: center; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; }
        
        .legend { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; }
        .box { width: 15px; height: 15px; border-radius: 3px; }

        .print-btn { display: block; margin: 20px auto; padding: 12px 25px; background: #1a73e8; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .print-btn:hover { background: #1557b0; }

        @media print { .print-btn, .legend { display: none; } body { background: white; } .week-container { box-shadow: none; border: 1px solid #ccc; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 Vaktplan April 2026</h1>
    <div id="wrapper"></div>

    <div class="legend">
        <div class="legend-item"><div class="box vakt-D"></div> Dagvakt (D)</div>
        <div class="legend-item"><div class="box vakt-L"></div> kveldsvakt (L)</div>
        <div class="legend-item"><div class="box vakt-B"></div> Bakvakt (B)</div>
        <div class="legend-item"><div class="box vakt-A"></div> Ansvar (A)</div>
        <div class="legend-item"><div class="box vakt-F"></div> Fri/Ferie (F)</div>
    </div>

    <button class="print-btn" onclick="window.print()">Skriv ut / Lagre som PDF</button>
</div>

<script>
    const ansatte = ["Alex", "Mats", "Ole Christian", "Pedro"];
    
    // Sjekk om det er "i dag" i April 2026
    const today = new Date();
    const isApril26 = today.getMonth() === 3 && today.getFullYear() === 2026;
    const currentDay = today.getDate();

    const ukePlan = [
        { uke: 14, dager: [{n:1, t:"Ons"}, {n:2, t:"Tor"}, {n:3, t:"Fre"}] },
        { uke: 15, dager: [{n:6, t:"Man"}, {n:7, t:"Tir"}, {n:8, t:"Ons"}, {n:9, t:"Tor"}, {n:10, t:"Fre"}] },
        { uke: 16, dager: [{n:13, t:"Man"}, {n:14, t:"Tir"}, {n:15, t:"Ons"}, {n:16, t:"Tor"}, {n:17, t:"Fre"}] },
        { uke: 17, dager: [{n:20, t:"Man"}, {n:21, t:"Tir"}, {n:22, t:"Ons"}, {n:23, t:"Tor"}, {n:24, t:"Fre"}] },
        { uke: 18, dager: [{n:27, t:"Man"}, {n:28, t:"Tir"}, {n:29, t:"Ons"}, {n:30, t:"Tor"}] }
    ];

    const initialData = {
        "Alex": { 1: "D", 6: "D", 8: "B", 9: "L" },
        "Mats": { 1: "A", 6: "L", 7: "D", 9: "B" },
        "Ole Christian": { 1: "L", 6: "B", 7: "L", 8: "D" },
        "Pedro": { 1: "A", 7: "B", 8: "L", 9: "D" }
    };

    const wrapper = document.getElementById('wrapper');

    ukePlan.forEach(ukeObj => {
        let div = document.createElement('div');
        div.className = 'week-container';
        
        let html = `<div class="week-title">Uke ${ukeObj.uke}</div>`;
        html += `<table><thead><tr><th class="name-col">Ansatt</th>`;
        ukeObj.dager.forEach(d => { 
            let todayClass = (isApril26 && d.n === currentDay) ? 'today-col' : '';
            html += `<th class="${todayClass}">${d.t} ${d.n}.</th>`; 
        });
        html += `</tr></thead><tbody>`;

        ansatte.forEach(navn => {
            html += `<tr><td class="name-col">${navn}</td>`;
            ukeObj.dager.forEach(d => {
                let vakt = (initialData[navn] && initialData[navn][d.n]) ? initialData[navn][d.n] : "";
                let key = `apr26-v3-${navn}-${d.n}`;
                let saved = localStorage.getItem(key) || vakt;
                let c = saved ? `vakt-${saved.toUpperCase()}` : "";
                let todayClass = (isApril26 && d.n === currentDay) ? 'today-col' : '';
                
                html += `<td class="${c} ${todayClass}"><input type="text" maxlength="1" value="${saved}" oninput="update(this, '${navn}', ${d.n})"></td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        div.innerHTML = html;
        wrapper.appendChild(div);
    });

    function update(input, navn, dag) {
        const val = input.value.toUpperCase().trim();
        input.value = val;
        const td = input.parentElement;
        
        // Fjern gamle vakt-klasser
        td.className = td.className.replace(/\bvakt-\S+/g, '');
        
        // Legg til ny klasse hvis verdi finnes
        if (val) {
            td.classList.add(`vakt-${val}`);
        }
        
        localStorage.setItem(`apr26-v3-${navn}-${dag}`, val);
    }
</script>
</body>
</html>
